*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--bg2:#1e293b;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--primary:#6366f1;--primary-l:#a5b4fc;--green:#4ade80;--green-d:#22c55e;--yellow:#fbbf24;--red:#f87171;--check-bg:rgba(74,222,128,0.08);--check-border:rgba(74,222,128,0.2)}
html,body{height:100%;overflow:hidden}
body{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);font-size:14px;line-height:1.4}

.header{padding:14px 16px 0;flex-shrink:0;background:linear-gradient(180deg,var(--bg) 85%,transparent);position:relative;z-index:10}

.logo{font-size:19px;font-weight:800;letter-spacing:-0.5px}
.sub{color:var(--text3);font-size:11px;margin-top:2px}
.badge{padding:5px 12px;border-radius:16px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.2);color:var(--primary-l);font-size:13px;font-weight:700}
.tabs{display:flex;gap:2px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;border-radius:9px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
.tab.active{background:rgba(99,102,241,0.2);color:var(--primary-l);font-weight:700}
.content{flex:1;overflow-y:auto;padding:6px 14px 90px;-webkit-overflow-scrolling:touch}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px 18px;margin-bottom:14px}
.label{color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:block}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;margin-bottom:5px;cursor:pointer;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);transition:all .15s;-webkit-user-select:none;user-select:none}
.check-row.checked{background:var(--check-bg);border-color:var(--check-border)}
.check-row:active{transform:scale(0.98)}
.check-left{display:flex;align-items:center;gap:9px}
.checkbox{width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#fff;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.checked .checkbox{background:linear-gradient(135deg,var(--green),var(--green-d));border-color:var(--green)}
.check-name{color:var(--text);font-size:13px;font-weight:500}
.check-dose{color:var(--text3);font-size:11px}
.group-label{color:var(--text3);font-size:10px;font-weight:600;margin:12px 0 6px;display:flex;align-items:center;gap:5px}
.num-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;margin-bottom:5px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05)}
.num-row .name{color:var(--text);font-size:13px}
.num-ctrl{display:flex;align-items:center;gap:7px}
.num-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.num-btn:active{background:rgba(255,255,255,0.08)}
.num-val{color:var(--text);font-size:17px;font-weight:700;min-width:26px;text-align:center}
.num-val.done{color:var(--green)}
.num-target{color:var(--text3);font-size:11px}
.score-big{font-size:46px;font-weight:800;line-height:1;text-align:center}
.score-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:12px}
.score-fill{height:100%;border-radius:3px;transition:width .5s ease}

.subj-info{flex:1;min-width:0}
.subj-name{color:var(--text2);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.subj-val{color:var(--text);font-size:15px;font-weight:700;min-width:18px;text-align:right}

.intro-label{color:var(--text);font-size:12px}
.intro-badge{margin-left:auto;color:var(--primary-l);font-size:10px;font-weight:600}

.m-del{background:none;border:none;color:var(--text4);cursor:pointer;font-size:13px;padding:2px}
.delta-box{margin-top:12px;padding:10px 12px;border-radius:9px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.12)}

.delta-row{display:flex;justify-content:space-between;padding:2px 0}
.delta-name{color:var(--text2);font-size:11px}
.delta-val{font-size:11px;font-weight:600}
.subj-hist{margin-bottom:14px}
.subj-hist-label{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.subj-hist-label span:first-child{font-size:13px}
.subj-hist-label span:last-child{color:var(--text2);font-size:11px}
.subj-hist-bars{display:flex;align-items:flex-end;gap:2px;height:36px}
.subj-hist-bar{flex:1;border-radius:2px;transition:height .3s}
.empty-msg{color:var(--text4);font-size:12px;text-align:center;padding:20px}
.steps-input{width:70px;padding:5px 8px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;font-family:inherit}

.start-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:12px;padding:14px 36px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 8px 28px rgba(99,102,241,0.3);font-family:inherit}

.intro-progress{display:flex;gap:3px;margin-bottom:14px}
.intro-seg{flex:1;height:5px;border-radius:3px}
.intro-seg.filled{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.intro-seg.empty{background:rgba(255,255,255,0.06)}
</style>
